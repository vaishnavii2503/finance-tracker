<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Finance Tracker</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="topbar">
    <h1>Finance Tracker</h1>
    <p class="month-label" id="monthLabel"></p>
  </header>

  <main class="layout">

    <!-- Budget vs Spend overview -->
    <section class="panel" id="summaryPanel">
      <h2>This month</h2>
      <div id="summaryList" class="summary-list">
        <p class="empty-state">No expenses or budgets yet. Add one below to see your summary here.</p>
      </div>
    </section>

    <!-- Add expense -->
    <section class="panel">
      <h2>Add an expense</h2>
      <form id="expenseForm" class="stacked-form">
        <div class="field-row">
          <label for="expenseAmount">Amount</label>
          <input type="number" id="expenseAmount" step="0.01" min="0.01" placeholder="0.00" required />
        </div>
        <div class="field-row">
          <label for="expenseCategory">Category</label>
          <input type="text" id="expenseCategory" placeholder="e.g. Food, Travel, Rent" required />
        </div>
        <div class="field-row">
          <label for="expenseDate">Date</label>
          <input type="date" id="expenseDate" required />
        </div>
        <div class="field-row">
          <label for="expenseNote">Note (optional)</label>
          <input type="text" id="expenseNote" placeholder="e.g. lunch with team" />
        </div>
        <button type="submit">Add expense</button>
        <p class="form-error" id="expenseError"></p>
      </form>
    </section>

    <!-- Set budget -->
    <section class="panel">
      <h2>Set a monthly budget</h2>
      <form id="budgetForm" class="stacked-form">
        <div class="field-row">
          <label for="budgetCategory">Category</label>
          <input type="text" id="budgetCategory" placeholder="e.g. Food" required />
        </div>
        <div class="field-row">
          <label for="budgetLimit">Monthly limit</label>
          <input type="number" id="budgetLimit" step="0.01" min="0.01" placeholder="0.00" required />
        </div>
        <button type="submit">Save budget</button>
        <p class="form-error" id="budgetError"></p>
      </form>
    </section>

    <!-- Expense list -->
    <section class="panel panel-wide">
      <h2>All expenses</h2>
      <table class="expense-table" id="expenseTable">
        <thead>
          <tr>
            <th>Date</th>
            <th>Category</th>
            <th>Note</th>
            <th class="num">Amount</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="expenseTableBody">
          <!-- rows injected by app.js -->
        </tbody>
      </table>
      <p class="empty-state" id="expenseEmptyState">No expenses yet.</p>
    </section>

  </main>

  <script src="app.js"></script>
</body>
</html>
