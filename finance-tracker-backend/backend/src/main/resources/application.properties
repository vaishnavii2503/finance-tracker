# Server runs on this port. Frontend (opened as a local file) will call http://localhost:8080
server.port=8080

# H2 database stored as a file on disk (./data/financetracker.mv.db), so data survives restarts
spring.datasource.url=jdbc:h2:file:./data/financetracker
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Auto-create/update tables based on our Java model classes (good for dev, not for production)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# H2's web console, handy for peeking at data directly: http://localhost:8080/h2-console
# JDBC URL to use when you open it: jdbc:h2:file:./data/financetracker
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
